<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARP Presentations - Craig Motlin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-orange: #D4A27F;
            --anthropic-dark: #0E0E0E;
            --anthropic-background-light: #FDFDF7;
            --anthropic-background-dark: #09090B;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-tertiary: #A3A3A3;
            --accent-blue: #3B82F6;
            --accent-green: #10B981;
            --border-light: #E5E5E5;
            --border-medium: #D4D4D4;
            --surface-secondary: #F9F9F6;
            --surface-tertiary: #F1F1EE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--anthropic-background-light);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            flex: 1;
        }

        header {
            background: linear-gradient(135deg, var(--anthropic-dark) 0%, rgba(212, 162, 127, 0.1) 100%);
            border-bottom: 1px solid var(--border-light);
            padding: 3rem 0;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--anthropic-dark) 0%, var(--anthropic-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.25rem;
            font-weight: 400;
        }

        .presentations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .presentation-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .presentation-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: var(--anthropic-orange);
        }

        .presentation-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 0.5rem;
        }

        .links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: var(--surface-secondary);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
        }

        .links a:hover {
            background: var(--anthropic-orange);
            color: var(--anthropic-dark);
            border-color: var(--anthropic-orange);
        }

        footer {
            background: var(--surface-tertiary);
            border-top: 1px solid var(--border-light);
            padding: 2rem 0;
            margin-top: 4rem;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-links {
            display: flex;
            gap: 2rem;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--anthropic-orange);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --anthropic-background-light: var(--anthropic-background-dark);
                --text-primary: #E5E5E5;
                --text-secondary: #B0B0B0;
                --text-tertiary: #7A7A7A;
                --border-light: #2E2E32;
                --border-medium: #3E3E42;
                --surface-secondary: #1A1A1D;
                --surface-tertiary: #2E2E32;
            }

            .presentation-card {
                background: #1A1A1D;
            }

            .presentation-title {
                color: #E5E5E5;
            }

            h1 {
                background: linear-gradient(135deg, #FFFFFF 0%, var(--anthropic-orange) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📊 MARP Presentations</h1>
            <p class="subtitle">Technical presentations powered by MARP and styled with Anthropic theme</p>
        </div>
    </header>

    <main class="container">
        <div class="presentations-grid">
